<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Cosmos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:black;
overflow:hidden;

}

canvas{
position:fixed;
top:0;
left:0;
}

#login{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
width:90%;

}

h1{

font-size:45px;
margin-bottom:20px;

}

p{

font-size:24px;

line-height:1.9;

color:rgba(255,255,255,.92);

}

input{

padding:15px;
width:280px;
border:none;
border-radius:30px;
font-size:18px;
text-align:center;

}

button{

margin-top:40px;

padding:18px 45px;

border:none;

border-radius:50px;

background:linear-gradient(45deg,#ffffff,#ececec);

font-size:20px;

cursor:pointer;

transition:.4s;

box-shadow:0 0 25px rgba(255,255,255,.25);

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 40px rgba(255,255,255,.5);

}

#content{

display:none;

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

width:700px;

max-width:90%;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.2);

border-radius:30px;

padding:60px;

color:white;

text-align:center;

box-shadow:0 0 60px rgba(255,255,255,.08);

animation:fade 2s;

}

@keyframes fade{

from{

opacity:0;

transform:translate(-50%,-40%);

}

to{

opacity:1;

transform:translate(-50%,-50%);

}

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div id="login">

<h1>✨ Мой Kosmas ✨</h1>

<p>Эта Вселенная создана только для одного единственного монстра.</p>

<input id="pass" placeholder="Введите пароль">

<br>

<button onclick="check()">Открыть</button>

</div>

<div id="content">

<h1 id="title"></h1>

<p id="typing"></p>

<br><br>

<button id="next" style="display:none;">
Продолжить путешествие ✨
</button>

</div>

<script>

const password="Mr.K.";

function check(){

let p=document.getElementById("pass").value;

if(p===password){

document.getElementById("login").style.display="none";

document.getElementById("content").style.display="block";
typeWriter(text,typing);
}else{

alert("Неверный пароль ❤️");

}

}

const canvas=document.getElementById("stars");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<300;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2

});

}

function draw(){

ctx.fillStyle="black";

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();

ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

ctx.fill();

});

requestAnimationFrame(draw);

}

draw();
const title=document.getElementById("title");
const typing=document.getElementById("typing");
const next=document.getElementById("next");

const text=`Привет, Mr. K.

Сегодня я хочу показать тебе не сайт.

Я хочу показать тебе мир, в котором живёт моя любовь к тебе.

Не спеши.

Просто читай.

Каждое слово здесь написано сердцем.`;

function typeWriter(text,element,speed=45){

let i=0;

element.innerHTML="";

function write(){

if(i<text.length){

if(text.charAt(i)==="\n"){

element.innerHTML+="<br><br>";

}else{

element.innerHTML+=text.charAt(i);

}

i++;

setTimeout(write,speed);

}else{

next.style.display="inline-block";

}

}

write();

}
</script>

</body>
</html>
